name: CI

run-name: Main Workflow

on:
    issue_comment:
        types: [created, deleted, edited]
    pull_request:
        types: [opened, synchronize, closed, reopened, edited, locked]
    push:
        branches:
            - main

jobs:
    A:
        runs-on: ubuntu-latest
        steps:
            - name: run a script
              uses: actions/script@v6
              with:
                script: |
                    echo "Hello World"
                    echo "$GITHUB_EVENT_NAME"
                    echo "$SECRET_VALUE"
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                SECRET_VALUE: "THis is a secret value"